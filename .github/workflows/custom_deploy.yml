name: Custom Jellyfin Deploy

on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: "Build artifact name to deploy"
        required: true
      run_id:
        description: "Workflow run ID that produced the artifact"
        required: true
      jellyfin_web_sha:
        description: "jellyfin-web commit included in the package"
        required: true

permissions:
  actions: read
  contents: read

env:
  JELLYFIN_PACKAGE_SHARE_PATH: "/mnt/development-build-artifacts"
  JELLYFIN_DEPLOY_SSH_WRAPPER: "/opt/actions-runner/.ssh/jellyfin-deploy-ssh"
  GITHUB_RUNNER_DEPLOY_SSH_TARGET_HOST: "10.0.50.25"
  GITHUB_RUNNER_DEPLOY_SSH_USER: "github-runner-deploy"

jobs:
  deploy:
    name: Publish and deploy Debian package
    runs-on: [self-hosted, linux, personal, jellyfin-packaging]

    steps:
      - name: Download built packages
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          run-id: ${{ inputs.run_id }}
          github-token: ${{ github.token }}

      - name: Inspect downloaded artifact
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Downloaded artifact structure ==="
          find . -maxdepth 4 -type f \( -name '*.deb' -o -name 'manifest.txt' \) -ls
          echo "====================================="
          echo "=== All files in workspace ==="
          ls -laR out/ 2>&1 || echo "No out/ directory"

      - name: Verify runner SMB package share
        shell: bash
        run: |
          set -euo pipefail
          test -d "${JELLYFIN_PACKAGE_SHARE_PATH}"
          mountpoint -q "${JELLYFIN_PACKAGE_SHARE_PATH}"

      - name: Publish packages to SMB share
        id: publish
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${{ inputs.jellyfin_web_sha }}"
          short_sha="${short_sha:0:12}"
          release_dir="${JELLYFIN_PACKAGE_SHARE_PATH}/custom/${short_sha}"

          install -d -m 0775 "${release_dir}"
          install -m 0664 out/debian/*.deb "${release_dir}/"
          install -m 0664 out/custom/manifest.txt "${release_dir}/"

          echo "release_dir=${release_dir}" >> "${GITHUB_OUTPUT}"

      - name: Deploy packages to Jellyfin host
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -x "${JELLYFIN_DEPLOY_SSH_WRAPPER}" ]]; then
            echo "Missing deploy SSH wrapper at ${JELLYFIN_DEPLOY_SSH_WRAPPER}" >&2
            exit 1
          fi

          remote_tmp="/tmp/${{ inputs.artifact_name }}"

          # Create remote temp directory
          "${JELLYFIN_DEPLOY_SSH_WRAPPER}" \
            "rm -rf '${remote_tmp}' && mkdir -p '${remote_tmp}'"

          # Transfer .deb files via tar over SSH, stripping the out/debian/ prefix
          tar czf - out/debian/*.deb \
            | "${JELLYFIN_DEPLOY_SSH_WRAPPER}" \
              "tar xzf - --strip-components=2 -C '${remote_tmp}'"

          # Install package preserving Ansible-managed conffiles,
          # then reconcile system state after the package update
          "${JELLYFIN_DEPLOY_SSH_WRAPPER}" "
            set -e
            sudo DEBIAN_FRONTEND=noninteractive apt-get install \
              --yes -o Dpkg::Options::=--force-confold \
              '${remote_tmp}'/*.deb
            sudo systemctl daemon-reload
            sudo systemctl try-reload-or-restart nginx    || true
            sudo systemctl try-reload-or-restart vault-agent || true
            sudo systemctl restart jellyfin
          "
